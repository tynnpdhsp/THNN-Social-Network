map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name social.hcmue.info.vn;

    # Frontend container (Vite build served by nginx in container)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI REST + WebSocket (/api/v1/messaging/ws)
    # Backend: MAX_COVER_SIZE_MB=10 (ảnh bìa, tổng ảnh shop); MAX_AVATAR_SIZE_MB=5 (avatar, ảnh bài).
    # 11m = trần 10MB nội dung + biên multipart; chỉnh theo .env nếu đổi MAX_*_SIZE_MB.
    location /api/ {
        client_max_body_size 11m;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # Public MinIO object access through same domain
    # Ensure bucket policy is read-only public for required objects.
    location /storage/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
